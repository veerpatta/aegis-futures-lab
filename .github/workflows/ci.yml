# CI guard for pull requests + the bot's own challenger/promotion PRs.
#
# The `test` job runs on every human PR. Bot PRs are opened with GITHUB_TOKEN,
# which GitHub deliberately does NOT re-trigger `pull_request` workflows for —
# so those get their pass/fail from (a) the proposing workflow itself
# (weekly-challenger runs the suite inline and sets the `bot-ci` commit status)
# and (b) the `bot-branches` job below, which re-checks every open bot/* PR
# daily and on demand. Either way no bot PR reaches a human without a visible,
# machine-set status.

name: ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *" # daily re-check of open bot PRs

permissions:
  contents: read
  statuses: write
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  bot-branches:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Re-check open bot PRs and set commit status
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          prs=$(gh pr list --repo "$GH_REPO" --state open --json number,headRefName,headRefOid \
            --jq '.[] | select(.headRefName|startswith("bot/")) | [.headRefName,.headRefOid] | @tsv')
          if [ -z "$prs" ]; then echo "no open bot PRs"; exit 0; fi
          while IFS=$'\t' read -r ref sha; do
            echo "::group::$ref ($sha)"
            git fetch origin "$ref"
            git checkout "$sha"
            if npx tsc --noEmit && npm test; then state=success; desc="parity + full test suite green"; else state=failure; desc="tests failed"; fi
            gh api "repos/$GH_REPO/statuses/$sha" -f state="$state" -f context=bot-ci -f description="$desc"
            echo "::endgroup::"
          done <<< "$prs"
