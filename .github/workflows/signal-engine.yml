# Scheduled paper-signal engine: recomputes the tier A/B signal streams from
# delayed Yahoo data and mirrors them into Supabase for the dashboard.
#
# Cron is UTC and GitHub delays cron jobs by 5-15 min — fine for a paper
# log, never rely on it for live execution. 06:00-21:45 UTC Mon-Fri covers
# the London+NY entry window (02:00-15:25 ET) in both DST regimes.
#
# Writes need the service-role key: public write policies were dropped
# (supabase/migrations/20260723100000_lock_down_public_writes.sql), so the
# publishable key can only read. The secret may live under either name;
# run-live.ts exits with an actionable error if neither is set.

name: signal-engine

on:
  schedule:
    - cron: "*/15 6-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: signal-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/engine/run-live.ts
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Ring 1 kill switch: "1" freezes breakers/veto (existing pauses stay).
          BOT_POLICY_FREEZE: ${{ vars.BOT_POLICY_FREEZE }}
