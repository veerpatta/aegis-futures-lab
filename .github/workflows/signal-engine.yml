# Scheduled paper-signal engine: recomputes the tier A/B signal streams from
# delayed Yahoo data and mirrors them into Supabase for the dashboard.
#
# Cron is UTC and GitHub delays cron jobs by 5-15 min — fine for a paper
# log, never rely on it for live execution. 06:00-21:45 UTC Mon-Fri covers
# the London+NY entry window (02:00-15:25 ET) in both DST regimes.
#
# Writes use the publishable key (RLS allows writes on these paper tables).
# To tighten later: add a SUPABASE_SERVICE_ROLE_KEY repo secret, set it as
# SUPABASE_KEY below, and drop the public write policies in Supabase.

name: signal-engine

on:
  schedule:
    - cron: "*/15 6-21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: signal-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/engine/run-live.ts
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
