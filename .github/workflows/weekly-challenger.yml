# Ring 2 — the bot proposes its own upgrades as PRs. Sunday 04:00 UTC (+
# dispatch). Re-runs the honest tune search + shadow promotion checklist and,
# when the SAME challenger survives two consecutive weeks, opens a PR editing
# the bot-editable blocks in tiers.ts. Never merges, never pushes to main.
#
# "No challenger survives yet" is the normal, healthy outcome — nothing changes
# live paper params without a human merge.

name: weekly-challenger

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-challenger
  cancel-in-progress: false

jobs:
  challenge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/engine/challenger.ts
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
