# Monthly walk-forward check of the live tier configuration, posted as a
# GitHub issue for a HUMAN decision. This workflow never edits parameters —
# scripts/engine/tiers.ts only ever changes by a human commit. It replays
# the live params over the trailing 60 Yahoo days (the original tuning
# window) and over the longest window the bars_5m archive supports, so the
# tuning numbers can be re-judged on growing evidence each month.
#
# Cron: 06:00 UTC on days 1-7 and on Saturdays (cron ORs day-of-month with
# day-of-week), narrowed to the first Saturday by the guard step. The extra
# scheduled firings are no-ops that double as keep-alive activity so GitHub
# never disables the repo's scheduled workflows for inactivity.

name: monthly-tune

on:
  schedule:
    - cron: "0 6 1-7 * 6"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: monthly-tune
  cancel-in-progress: false

jobs:
  tune:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: First-Saturday guard
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%u)" = "6" ] && [ "$(date -u +%-d)" -le 7 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.run == 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.guard.outputs.run == 'true'
      - name: Baseline — live params over the trailing 60 Yahoo days
        if: steps.guard.outputs.run == 'true'
        run: npx tsx scripts/engine/report.ts --markdown > baseline.md
      - name: Walk-forward — live params over the full bar archive
        if: steps.guard.outputs.run == 'true'
        run: npx tsx scripts/engine/report.ts --markdown --archive > archive.md
      - name: Post the comparison as an issue
        if: steps.guard.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          month=$(date -u +%Y-%m)
          {
            echo "The live tier configuration (\`scripts/engine/tiers.ts\`, tuned 2026-07-19) replayed over two windows. Same simulator, same costs, same discipline locks as the live engine."
            echo
            echo "## Trailing 60 days (original tuning window, Yahoo)"
            cat baseline.md
            echo
            echo "## Longest window the bar archive supports"
            cat archive.md
            echo
            echo "---"
            echo
            echo "**No automatic change is made.** \`tiers.ts\` is only ever edited by a human commit. If the walk-forward numbers have degraded, re-tune by hand and commit; if they hold up, close this issue with \"keep\"."
          } > body.md
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Monthly tune $month: keep or adjust tiers" \
            --body-file body.md
